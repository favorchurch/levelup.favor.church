<!DOCTYPE html>

<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .perspective-text {
        text-shadow: 0px 4px 0px #872100;
      }
      .glow-primary {
        box-shadow: 0 0 40px rgba(255, 87, 35, 0.3);
      }
      .tactile-button {
        box-shadow: 0 4px 0 0 #872100;
      }
      .tactile-button:active {
        transform: translateY(4px);
        box-shadow: 0 0 0 0 #872100;
      }
      .bg-celebration {
        background: radial-gradient(circle at center, #3b0900 0%, #131313 100%);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col overflow-x-hidden">
<!-- Top Navigation (Shell Implementation) -->
<header class="flex justify-between items-center w-full px-margin-mobile h-16 bg-surface-container-low dark:bg-surface-container-low fixed top-0 z-50">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary-container" data-icon="bolt">bolt</span>
<h1 class="font-display-lg text-title-md tracking-tighter text-primary-container dark:text-primary-container italic">LEVEL UP</h1>
</div>
<div class="flex items-center gap-4">
<span class="font-label-bold text-label-bold text-primary-container">7 🔥 1250 XP</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col items-center justify-center pt-24 pb-32 px-margin-mobile bg-celebration relative">
<!-- Back Button -->
<button class="absolute top-20 left-margin-mobile flex items-center gap-2 text-on-surface-variant font-label-bold hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
            Back to Journey
        </button>
<!-- Epic Chest Section -->
<div class="relative w-full max-w-md aspect-square flex items-center justify-center mb-lg">
<!-- Background Aura -->
<div class="absolute inset-0 bg-primary-container/20 rounded-full blur-[100px] animate-pulse"></div>
<!-- Floating Elements / Particles -->
<div class="absolute top-0 left-1/4 text-primary-container opacity-60 animate-bounce">
<span class="material-symbols-outlined text-4xl" data-icon="star" data-weight="fill">star</span>
</div>
<div class="absolute bottom-10 right-1/4 text-primary-container opacity-40 animate-pulse">
<span class="material-symbols-outlined text-5xl" data-icon="flare" data-weight="fill">flare</span>
</div>
<!-- The Chest -->
<div class="relative group cursor-pointer">
<div class="w-64 h-64 md:w-80 md:h-80 bg-surface-container-high rounded-3xl border-4 border-primary-container flex items-center justify-center glow-primary transition-transform duration-300 group-hover:scale-105 active:scale-95 overflow-hidden">
<img alt="Mystery Chest" class="w-full h-full object-cover mix-blend-overlay opacity-30" data-alt="A magnificent, oversized treasure chest crafted from dark enchanted wood and glowing orange metal filigree. The chest sits in the center of a high-energy digital arena, radiating intense amber light from its seams. The aesthetic is high-octane gamification with thick outlines and vibrant electric orange accents against a deep charcoal background. Volumetric light rays escape from the lid, suggesting immense power within." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAKleIp1TA1Xd7OyRmkZTmDHg3eWQ4j7D_JY07sEHMOZy8ta9osvskkgTyrSOMvVxaz3rZNyH00OH9oBMs2zwraYaOvWuRAPZx79HC2_2AgqhQuF_RbeM37CeSMyedTQRgB87LQHUnazyO0PoJJ2fgmM2Vztvf4xwRUIKSDFSaIjMpglYq1bnQWuVwmr8OQR1jxiNBzCcTj7MsVW7RDnVQoquBuHUS8sBH8Uns2nQTTjKmRPx7-4YKsQTEC_J2x6zwtpD96BZ9SHI79"/>
<div class="absolute inset-0 flex flex-col items-center justify-center">
<span class="material-symbols-outlined text-8xl text-primary-container mb-4" data-icon="card_giftcard" data-weight="fill">card_giftcard</span>
</div>
</div>
<!-- Tap Indicator -->
<div class="absolute -bottom-8 left-1/2 -translate-x-1/2 w-full text-center">
<p class="font-headline-lg text-headline-lg text-primary-container perspective-text uppercase tracking-widest italic animate-bounce">
                        Tap to Open
                    </p>
</div>
</div>
</div>
<!-- Potential Rewards Section -->
<div class="w-full max-w-xl">
<h2 class="font-headline-lg text-title-md text-on-surface text-center mb-md uppercase tracking-tight">Potential Rewards</h2>
<div class="grid grid-cols-3 gap-4">
<!-- Reward 1 -->
<div class="bg-surface-container rounded-xl p-4 flex flex-col items-center border-2 border-surface-variant hover:border-primary-container transition-colors group">
<div class="w-12 h-12 rounded-full bg-surface-container-highest flex items-center justify-center mb-2 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-primary-container" data-icon="military_tech" data-weight="fill">military_tech</span>
</div>
<span class="font-label-bold text-label-sm text-center">Rare Badge</span>
</div>
<!-- Reward 2 -->
<div class="bg-surface-container rounded-xl p-4 flex flex-col items-center border-2 border-surface-variant hover:border-primary-container transition-colors group">
<div class="w-12 h-12 rounded-full bg-surface-container-highest flex items-center justify-center mb-2 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-primary-container" data-icon="keyboard_double_arrow_up" data-weight="fill">keyboard_double_arrow_up</span>
</div>
<span class="font-label-bold text-label-sm text-center">Bonus XP</span>
</div>
<!-- Reward 3 -->
<div class="bg-surface-container rounded-xl p-4 flex flex-col items-center border-2 border-surface-variant hover:border-primary-container transition-colors group">
<div class="w-12 h-12 rounded-full bg-surface-container-highest flex items-center justify-center mb-2 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-primary-container" data-icon="generating_tokens" data-weight="fill">generating_tokens</span>
</div>
<span class="font-label-bold text-label-sm text-center">Token</span>
</div>
</div>
</div>
</main>
<!-- Bottom Navigation (Shell Implementation) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 pb-safe bg-surface-container dark:bg-surface-container border-t-2 border-surface-variant shadow-lg">
<!-- Home -->
<a class="flex flex-col items-center justify-center text-on-surface-variant px-6 py-2 hover:bg-surface-bright dark:hover:bg-surface-bright transition-all" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-label-bold text-label-sm">Home</span>
</a>
<!-- Leagues (Active Mapping: Mystery Chest is a gamified minigame often linked to Leagues/Events) -->
<a class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-xl px-6 py-2 shadow-[0_4px_0_0_#872100] translate-y-1 transition-all duration-75" href="#">
<span class="material-symbols-outlined" data-icon="leaderboard" data-weight="fill">leaderboard</span>
<span class="font-label-bold text-label-sm">Leagues</span>
</a>
<!-- Badges -->
<a class="flex flex-col items-center justify-center text-on-surface-variant px-6 py-2 hover:bg-surface-bright dark:hover:bg-surface-bright transition-all" href="#">
<span class="material-symbols-outlined" data-icon="military_tech">military_tech</span>
<span class="font-label-bold text-label-sm">Badges</span>
</a>
</nav>
</body></html>
